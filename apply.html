<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apply | NextDrive EV Careers</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<h1>NextDrive EV</h1>

<p>Internship & Graduate Programme Application</p>

</header>

<div class="application-form">

<h2>Application Form</h2>

<p>Please complete every section before submitting your application.</p>

<form>

<h3>Personal Information</h3>

<label>Full Name *</label>
<input type="text" required>

<label>ID / Passport Number *</label>
<input type="text" required>

<label>Date of Birth *</label>
<input type="date" required>

<label>Gender *</label>
<select required>
<option value="">Select</option>
<option>Male</option>
<option>Female</option>
<option>Prefer not to say</option>
</select>

<label>Email Address *</label>
<input type="email" required>

<label>Phone Number *</label>
<input type="tel" required>

<label>Province *</label>
<select required>
<option value="">Select Province</option>
<option>Gauteng</option>
<option>Limpopo</option>
<option>Mpumalanga</option>
<option>North West</option>
<option>Free State</option>
<option>KwaZulu-Natal</option>
<option>Western Cape</option>
<option>Eastern Cape</option>
<option>Northern Cape</option>
</select>

<h3>Education</h3>

<label>Highest Qualification *</label>
<select required>
<option value="">Select</option>
<option>Matric</option>
<option>Certificate</option>
<option>Diploma</option>
<option>Degree</option>
<option>Honours</option>
<option>Masters</option>
</select>

<label>Field of Study *</label>
<input type="text" required>

<label>Institution *</label>
<input type="text" required>

<h3>Internship Selection</h3>

<label>Programme *</label>
<select required>

<option>Engineering</option>

<option>Information Technology</option>

<option>Marketing</option>

<option>Business Administration</option>

<option>Finance</option>

<option>Supply Chain & Logistics</option>

<option>Human Resources</option>

<option>Electric Vehicle Technology</option>

</select>

<h3>Upload Documents</h3>

<label>Curriculum Vitae (CV) *</label>
<input type="file" required>

<label>Certified ID *</label>
<input type="file" required>

<label>Qualification / Academic Record *</label>
<input type="file" required>

<h3>Motivation</h3>

<label>Why do you want to join NextDrive EV? *</label>

<textarea required></textarea>

<label>

<input type="checkbox" required>

I confirm that all information provided is true and accurate.

</label>

<button type="submit">

Submit Application

</button>

</form>

</div>

<footer>

<p>© 2026 NextDrive EV | Building Africa's Electric Future</p>

</footer>

</body>

  </html>
