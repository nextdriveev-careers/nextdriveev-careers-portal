<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Apply | NextDrive EV</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<h1>NextDrive EV</h1>

<h2>Internship Application</h2>

</header>

<section class="application-form">

<h2>Apply Today</h2>

<form>

<label>Full Name</label>
<input type="text" placeholder="Enter your full name">

<label>Email Address</label>
<input type="email" placeholder="Enter your email">

<label>Phone Number</label>
<input type="tel" placeholder="+27">

<label>Select Internship</label>

<select>

<option>Engineering</option>

<option>Information Technology</option>

<option>Marketing</option>

</select>

<label>Highest Qualification</label>

<input type="text" placeholder="Diploma / Degree">

<label>Upload CV</label>

<input type="file">

<label>Motivation</label>

<textarea placeholder="Tell us why you want to join NextDrive EV"></textarea>

<button type="submit">
Submit Application
</button>

</form>

</section>

</body>

</html>
