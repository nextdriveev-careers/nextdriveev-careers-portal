<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Apply | NextDrive EV</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>NextDrive EV</h1>
<p>Internship Application Form</p>
</header>

<nav>
<a href="index.html">Home</a>
<a href="internships.html">Internships</a>
<a href="apply.html">Apply</a>
<a href="about.html">About</a>
<a href="contact.html">Contact</a>
</nav>

<section class="section">

<h2>Internship Application</h2>

<form id="applicationForm">

<label>Full Name</label>
<input type="text" required>

<label>Email Address</label>
<input type="email" required>

<label>Phone Number</label>
<input type="tel" required>

<label>Province</label>
<select required>
<option value="">Select Province</option>
<option>Gauteng</option>
<option>Limpopo</option>
<option>Mpumalanga</option>
<option>North West</option>
<option>Free State</option>
<option>KwaZulu-Natal</option>
<option>Western Cape</option>
<option>Eastern Cape</option>
<option>Northern Cape</option>
</select>

<label>Highest Qualification</label>
<select required>
<option value="">Select</option>
<option>Grade 12</option>
<option>Certificate</option>
<option>Diploma</option>
<option>Advanced Diploma</option>
<option>Bachelor's Degree</option>
<option>Honours Degree</option>
<option>Master's Degree</option>
</select>

<label>Internship Department</label>
<select required>
<option value="">Select Department</option>
<option>Business Administration</option>
<option>Marketing</option>
<option>Sales</option>
<option>Finance</option>
<option>Data Analytics</option>
<option>Software Development</option>
<option>Engineering</option>
<option>Supply Chain & Logistics</option>
<option>Customer Support</option>
<option>Human Resources</option>
</select>

<label>Why do you want to join NextDrive EV?</label>
<textarea rows="5" required></textarea>

<button type="submit">
Submit Application
</button>

</form>

</section>

<footer>

<p><strong>NextDrive EV</strong></p>

<p>Building the Future of Electric Mobility in South Africa</p>

</footer>

<script src="script.js"></script>

</body>
</html>
